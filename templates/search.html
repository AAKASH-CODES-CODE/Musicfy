<div id="search-page" class="page-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; align-items: center;">
            <div class="profile-icon">A</div>
            <h1 class="section-title" style="margin: 0;">Search</h1>
        </div>
        <i class="fas fa-camera" style="font-size: 20px;"></i>
    </div>

    <div class="search-bar-container">
        <div class="search-input-box">
            <i class="fas fa-search"></i>
            <input type="text" id="main-search-input" placeholder="What do you want to listen to?">
        </div>
    </div>

    <div id="search-default-ui">
        <h2 class="sub-title" style="font-size: 16px; font-weight: 700; margin: 20px 0 12px 0;">Start browsing</h2>
        <div class="browse-grid">
            <div class="browse-card" style="background-color: #E13300;">
                <h3>Music</h3>
                <img src="https://i.scdn.co/image/ab6765630000ba8a81f07e1ead0317ee3c285bfa" alt="Cover">
            </div>
            <div class="browse-card" style="background-color: #1E3264;">
                <h3>Podcasts</h3>
                <img src="https://i.scdn.co/image/ab6765630000ba8a81f07e1ead0317ee3c285bfa" alt="Cover">
            </div>
            <div class="browse-card" style="background-color: #8D67AB;">
                <h3>Live Events</h3>
                <img src="https://i.scdn.co/image/ab6761610000e5eb8ae7f2aaa9817a704a87ea36" alt="Cover">
            </div>
            <div class="browse-card" style="background-color: #E8115B;">
                <h3>Home of I-Pop</h3>
                <img src="https://i.scdn.co/image/ab67706f000000020a76ce1e91ce86f2b740e53a" alt="Cover">
            </div>
        </div>

        <h2 class="sub-title" style="font-size: 16px; font-weight: 700; margin: 20px 0 12px 0;">Discover something new</h2>
        <div class="horizontal-scroll">
            <div class="scroll-card" style="width: 120px; height: 180px; background-color: #242424; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; position: relative;">
                <i class="fas fa-play" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; opacity: 0.5;"></i>
                <span style="font-size: 12px; font-weight: 600;">#haryanvi hip hop</span>
            </div>
            <div class="scroll-card" style="width: 120px; height: 180px; background-color: #242424; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; position: relative;">
                <i class="fas fa-play" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; opacity: 0.5;"></i>
                <span style="font-size: 12px; font-weight: 600;">#haryanvi pop</span>
            </div>
        </div>
    </div>

    <div id="search-results-ui" style="display: none; margin-top: 20px;">
        <div class="list-container" id="live-search-results">
            </div>
    </div>
</div>

<script>
    // Live Search Logic specific to this page
    const searchInput = document.getElementById('main-search-input');
    const defaultUI = document.getElementById('search-default-ui');
    const resultsUI = document.getElementById('search-results-ui');
    const resultsContainer = document.getElementById('live-search-results');
    let timeout = null;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        const query = e.target.value.trim();

        if (query.length > 0) {
            defaultUI.style.display = 'none';
            resultsUI.style.display = 'block';
            resultsContainer.innerHTML = '<p style="color: gray; text-align: center; margin-top: 20px;">Searching on YouTube Music...</p>';

            timeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();

                    if (data.success && data.results.length > 0) {
                        resultsContainer.innerHTML = ''; 
                        data.results.forEach(song => {
                            let title = song.title;
                            let artist = song.artists ? song.artists.map(a => a.name).join(', ') : 'Unknown';
                            let thumb = song.thumbnails && song.thumbnails.length > 0 ? song.thumbnails[song.thumbnails.length - 1].url : 'https://via.placeholder.com/55';
                            
                            resultsContainer.innerHTML += `
                                <div class="list-item">
                                    <img src="${thumb}" alt="Cover" style="width: 55px; height: 55px; border-radius: 4px; object-fit: cover;">
                                    <div class="item-info">
                                        <div class="item-title">${title}</div>
                                        <div class="item-subtitle">${artist}</div>
                                    </div>
                                    <i class="fas fa-ellipsis-v options-icon"></i>
                                </div>
                            `;
                        });
                    } else {
                        resultsContainer.innerHTML = '<p style="color: gray; text-align: center;">No results found.</p>';
                    }
                } catch (error) {
                    console.error("Search Error:", error);
                }
            }, 800); 
        } else {
            defaultUI.style.display = 'block';
            resultsUI.style.display = 'none';
        }
    });
</script>
